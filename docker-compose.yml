services:
  opencode-runtime:
    build:
      context: .
      args:
        OPENCODE_VERSION: "1.14.29"
    image: efp-opencode-runtime:test
    ports:
      - "8000:8000"
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: test-password
      OPENCODE_VERSION: "1.14.29"
      EFP_RUNTIME_TYPE: opencode
    volumes:
      - ./workspace:/workspace
