name: CI
on: [push, pull_request]
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[test]"
      - run: |
          set -o pipefail
          set +e
          python -m pytest -q 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          set -e
          if [[ "${status}" -ne 0 ]]; then
            python - <<'PY'
          from pathlib import Path
          lines = Path("pytest.log").read_text(encoding="utf-8", errors="replace").splitlines()
          msg = "\n".join(lines[-120:])
          msg = msg.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=pytest failed::{msg}")
          PY
          fi
          exit "${status}"
    env:
      RUN_RUNTIME_CONTRACT_TESTS: '1'
  docker-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    # Heavy full-image integration smoke (35 min). Kept as an informational
    # signal but non-blocking so a flaky/slow image build cannot red the run;
    # unit-tests are the gating check.
    continue-on-error: true
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Prepare smoke build context
        run: |
          set -euo pipefail
          mkdir -p runtime-tools runtime-maven
          cat > runtime-tools/jira <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          case "${1:-}" in
            version)
              echo '{"ok":true,"version":"stub"}'
              ;;
            commands)
              echo '{"ok":true,"commands":[]}'
              ;;
            schema)
              echo '{"ok":true,"schema":{"type":"object"}}'
              ;;
            *)
              echo '{"ok":true,"stub":true}'
              ;;
          esac
          SH
          cat > runtime-tools/confluence <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          case "${1:-}" in
            version)
              echo '{"ok":true,"version":"stub"}'
              ;;
            commands)
              echo '{"ok":true,"commands":[]}'
              ;;
            schema)
              echo '{"ok":true,"schema":{"type":"object"}}'
              ;;
            *)
              echo '{"ok":true,"stub":true}'
              ;;
          esac
          SH
          cat > runtime-tools/aws-auth <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          case "${1:-}" in
            version)
              echo '{"ok":true,"version":"stub"}'
              ;;
            commands)
              echo '{"ok":true,"commands":[]}'
              ;;
            schema)
              echo '{"ok":true,"schema":{"type":"object"}}'
              ;;
            *)
              echo '{"ok":true,"stub":true}'
              ;;
          esac
          SH
          cat > runtime-tools/jenkins <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          case "${1:-}" in
            version)
              echo '{"ok":true,"version":"stub"}'
              ;;
            commands)
              echo '{"ok":true,"commands":[]}'
              ;;
            schema)
              echo '{"ok":true,"schema":{"type":"object"}}'
              ;;
            *)
              echo '{"ok":true,"stub":true}'
              ;;
          esac
          SH
          cat > runtime-tools/mobile-auto <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          case "${1:-}" in
            version)
              echo '{"ok":true,"version":"stub"}'
              ;;
            commands)
              echo '{"ok":true,"commands":[]}'
              ;;
            schema)
              echo '{"ok":true,"schema":{"type":"object"}}'
              ;;
            *)
              echo '{"ok":true,"stub":true}'
              ;;
          esac
          SH
          cat > runtime-tools/BrowserStackLocal <<'SH'
          #!/usr/bin/env bash
          exit 0
          SH
          chmod 0755 runtime-tools/jira runtime-tools/confluence runtime-tools/jenkins runtime-tools/aws-auth runtime-tools/mobile-auto runtime-tools/BrowserStackLocal
          runtime-tools/jira version --json >/dev/null
          runtime-tools/jira commands --json >/dev/null
          runtime-tools/jira schema issue.map-csv --json >/dev/null
          runtime-tools/jira schema issue.bulk-create --json >/dev/null
          runtime-tools/confluence version --json >/dev/null
          runtime-tools/confluence commands --json >/dev/null
          runtime-tools/confluence schema anything --json >/dev/null
          runtime-tools/jenkins version --json >/dev/null
          runtime-tools/jenkins commands --json >/dev/null
          runtime-tools/jenkins schema build.test-report --json >/dev/null
          runtime-tools/aws-auth version --json >/dev/null
          runtime-tools/aws-auth commands --json >/dev/null
          runtime-tools/mobile-auto version --json >/dev/null
          runtime-tools/mobile-auto commands --json >/dev/null
          runtime-tools/mobile-auto schema run.start --json >/dev/null
          cat > runtime-maven/settings.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
          </settings>
          XML
      - name: Run Docker smoke
        run: bash scripts/smoke.sh
