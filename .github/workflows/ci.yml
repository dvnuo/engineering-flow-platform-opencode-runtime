name: CI
on: [push, pull_request]
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[test]"
      - run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          if [[ "${status}" -ne 0 ]]; then
            python - <<'PY'
          from pathlib import Path
          lines = Path("pytest.log").read_text(encoding="utf-8", errors="replace").splitlines()
          msg = "\n".join(lines[-120:])
          msg = msg.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=pytest failed::{msg}")
          PY
          fi
          exit "${status}"
    env:
      RUN_RUNTIME_CONTRACT_TESTS: '1'
